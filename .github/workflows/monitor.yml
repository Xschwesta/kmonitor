name: KGEN Monitor

on:
  schedule:
    # Her 5 dakikada bir çalışır (UTC). GitHub Actions cron minimum 5dk.
    - cron: '*/5 * * * *'
  # Manuel tetiklemek için
  workflow_dispatch:

# Aynı anda 1 çalışsın (çakışma olmasın)
concurrency:
  group: kgen-monitor
  cancel-in-progress: false

# State dosyasını commit edebilmek için yazma izni
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run monitor
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT:    ${{ secrets.TG_CHAT }}
          POS_ENTRY:  ${{ secrets.POS_ENTRY }}
          POS_QTY:    ${{ secrets.POS_QTY }}
          POS_MARGIN: ${{ secrets.POS_MARGIN }}
          POS_TARGET: ${{ secrets.POS_TARGET }}
          ALARMS:     ${{ secrets.ALARMS }}
        run: python monitor.py

      - name: Commit state
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "KGEN Monitor"
          git add state/state.json || true
          # State değişmişse commit (boş commit hata vermesin diye --allow-empty değil, exit 0)
          if ! git diff --staged --quiet; then
            git commit -m "🤖 update state $(date -u +%H:%M)"
            git push
          else
            echo "no state changes"
          fi
